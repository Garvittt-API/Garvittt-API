name: GitHub Metrics

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Garvittt-API
          template: terminal, markdown
          base: header, activity, community, repositories, metadata
          config_output: png
          output: |
            github-metrics.svg
