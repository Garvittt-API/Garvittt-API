name: Activity Graph

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  activity:
    runs-on: ubuntu-latest
    steps:
      - uses: JamesIves/github-readme-stats@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          username: Garvittt-API
