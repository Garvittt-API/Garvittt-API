name: Activity Graph

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  activity:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Garvittt-API
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=green&color_dots=#007BFF,#7B2FF7,#00D4FF,#00E676,#FF6B9D
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
